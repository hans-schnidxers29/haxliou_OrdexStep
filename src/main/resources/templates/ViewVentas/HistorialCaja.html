<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/adminlte}">
<head>
    <title>Historial de Arqueos</title>
    <style>
        .date-badge { background: #f4f6f9; border-radius: 8px; padding: 5px 10px; display: inline-block; border-left: 3px solid #007bff; min-width: 140px; }
        .date-badge-close { border-left: 3px solid #6c757d; }
        .time-text { color: #1f2d3d; font-weight: 600; display: block; font-size: 0.85rem; }
        .day-text { color: #6c757d; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <section class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1><i class="fas fa-history mr-2"></i> Historial de Arqueos</h1>
                </div>
            </div>
        </div>
    </section>

    <section class="content">
        <div class="container-fluid">
            <div class="card card-outline card-primary shadow">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted text-uppercase small">
                            <tr>
                                <th>ID</th>
                                <th>Apertura / Cierre</th>
                                <th>Usuario</th>
                                <th>Monto Inicial</th>
                                <th>Flujo (Ing/Egr)</th>
                                <th>Monto Real</th>
                                <th>Diferencia</th>
                                <th class="text-center">Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="caja : ${lista}">
                                <td th:text="${caja.id}" class="text-muted font-weight-bold"></td>
                                <td>
                                    <div class="date-badge mb-1">
                                        <span class="day-text">Apertura</span>
                                        <span class="time-text" th:text="${#temporals.format(caja.fechaApertura, 'dd/MM/yyyy HH:mm')}"></span>
                                    </div>
                                    <div th:if="${caja.fechaCierre != null}" class="date-badge date-badge-close">
                                        <span class="day-text">Cierre</span>
                                        <span class="time-text" th:text="${#temporals.format(caja.fechaCierre, 'dd/MM/yyyy HH:mm')}"></span>
                                    </div>
                                    <div th:if="${caja.fechaCierre == null}" class="mt-1">
                                        <span class="badge badge-success px-2 py-1">Activa ahora</span>
                                    </div>
                                </td>
                                <td th:text="${caja.usuario.nombre}"></td>
                                <td th:text="${#numbers.formatCurrency(caja.montoInicial)}"></td>
                                <td>
                                    <div class="text-success small fw-bold" th:text="${'+' + #numbers.formatCurrency(caja.ingresoTotal)}"></div>
                                    <div class="text-danger small fw-bold" th:text="${'-' + #numbers.formatCurrency(caja.egresosTotales.add(caja.gastosTotales))}"></div>
                                </td>
                                <td class="font-weight-bold" th:text="${#numbers.formatCurrency(caja.montoReal)}"></td>
                                <td>
                                    <span th:class="${caja.diferencia < 0 ? 'text-danger' : (caja.diferencia > 0 ? 'text-warning' : 'text-success')} + ' font-weight-bold'"
                                          th:text="${#numbers.formatCurrency(caja.diferencia)}">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <span th:class="${caja.estado.name() == 'EN_PROCESO' ? 'badge badge-success' : 'badge badge-secondary'}"
                                          th:text="${caja.estado}"></span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <span th:if="${caja.estado.name() == 'EN_PROCESO'}">Caja Abierta</span>
                                        <a th:if="${caja.estado.name() == 'CERRADA'}" th:href="@{/caja/reporte-cierre-final/{id}(id=${caja.id})}" target="_blank" class="btn btn-default btn-sm"><i class="fas fa-file-pdf"></i></a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<th:block layout:fragment="scripts">
</th:block>
</body>
</html>
