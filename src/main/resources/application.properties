spring.application.name=web
server.port=8080

# -------------------------
# PostgreSQL - Neon / Render
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota


# -------------------------
# Optimizacion de Batch Processing
# -------------------------
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# -------------------------
# HikariCP Optimizado para Multi-Tenant
# -------------------------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=45000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.web.locale=es_CO
spring.web.locale-resolver=fixed
spring.jackson.locale=es_CO


spring.jackson.serialization.write_bigdecimal_as_plain=true
# -------------------------
# Recursos Estaticos
# -------------------------
spring.web.resources.static-locations=classpath:/static/

# Configuraci¾n del servidor SMTP (Ejemplo con Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_APP}
spring.mail.password=${PASSWORD_EMAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Opcional: para ver logs en consola si algo falla
logging.level.org.springframework.mail=DEBUG
